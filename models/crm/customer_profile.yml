version: 2

models:
  - name: customer_profile
    description: Enriched customer data with address and location details

    config:
      contract:
        enforced: true

    columns:
      - name: customer_id
        description: Unique identifier of the customer
        data_type: int64
        tests:
          - not_null
          - unique

      - name: first_name
        data_type: string

      - name: last_name
        data_type: string

      - name: email
        description: Customer email address
        data_type: string
        tests:
          - not_null

      - name: birth_date
        data_type: date

      - name: create_date
        data_type: timestamp

      - name: customer_last_update
        data_type: timestamp

      - name: address
        data_type: string

      - name: postal_code
        data_type: string

      - name: city
        data_type: string

      - name: country
        data_type: string